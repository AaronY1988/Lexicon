# XcodeGen spec — run `xcodegen generate` to produce Lexicon.xcodeproj
name: Lexicon
options:
  bundleIdPrefix: app.lexicon
  deploymentTarget:
    macOS: "13.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"

targets:
  Lexicon:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Lexicon
        excludes:
          - "Info.plist"
          - "Lexicon.entitlements"
          - "Bridging/Lexicon-Bridging-Header.h"
    info:
      path: Lexicon/Info.plist
      properties:
        CFBundleDisplayName: Lexicon
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSUIElement: true
        NSHumanReadableCopyright: "© 2026"
        NSAppleEventsUsageDescription: "Lexicon needs to read selected text from other apps so you can look up words instantly."
    entitlements:
      path: Lexicon/Lexicon.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.automation.apple-events: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.lexicon.Lexicon
        SWIFT_OBJC_BRIDGING_HEADER: Lexicon/Bridging/Lexicon-Bridging-Header.h
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
    dependencies:
      - sdk: CoreServices.framework
      - sdk: AppKit.framework
      - sdk: AVFoundation.framework
      - sdk: Carbon.framework
